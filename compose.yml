services:
  floci:
    image: hectorvent/floci:1.1.0
    ports:
      - '4566:4566' # Floci Gateway
      - '4510-4559:4510-4559' # external services port range
    env_file:
      - 'compose/aws.env'
    environment:
      DEBUG: ${DEBUG:-1}
      LS_LOG: WARN # Floci DEBUG Level
      SERVICES: s3,sqs,sns,firehose
      MONITOR_SQS: ${MONITOR_SQS:-true}
    healthcheck:
      test: ['CMD', 'curl', '--fail', 'http://127.0.0.1:4566']
      interval: 5s
      start_period: 5s
      retries: 3
    networks:
      - cdp-tenant

  floci-init:
    image: amazon/aws-cli
    entrypoint: /bin/sh
    command: /setup/start-floci.sh
    depends_on:
      floci:
        condition: service_healthy
    env_file:
      - 'compose/aws.env'
    volumes:
      - ./compose/start-floci.sh:/setup/start-floci.sh
    networks:
      - cdp-tenant

  mongodb:
    image: mongo:6.0.13
    command: ['mongod', '--replSet', 'rs0', '--bind_ip_all']
    networks:
      - cdp-tenant
    ports:
      - '27017:27017'
    volumes:
      - mongodb-data:/data/db
    restart: always
    healthcheck:
      test:
        ['CMD', 'mongosh', '--quiet', '--eval', 'db.runCommand({ ping: 1 }).ok']
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb-init:
    image: mongo:6.0.13
    depends_on:
      mongodb:
        condition: service_healthy
    command: >
      mongosh "mongodb://mongodb:27017" --eval 'try { rs.status(); print("Replica set already initialized"); } catch (e) { if (e.message.includes("no replset config")) { rs.initiate({_id: "rs0", members: [{ _id: 0, host: "localhost:27017" }]}); print("Replica set initialized"); } else { throw e; } }'
    networks:
      - cdp-tenant
    restart: 'no'

  ################################################################################

  farming-grants-agreements-api:
    profiles:
      - full
    build:
      context: ./
      target: development
    ports:
      - '3555:3555'
    depends_on:
      floci:
        condition: service_healthy
      floci-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      mongodb-init:
        condition: service_completed_successfully
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    command:
      [
        '/bin/sh',
        '-c',
        "echo 'Starting farming-grants-agreements-api...' && npm run docker:dev"
      ]
    env_file:
      - 'compose/aws.env'
    environment:
      PORT: 3555
      NODE_ENV: ${NODE_ENV:-development}
      FLOCI_ENDPOINT: http://floci:4566
      MONGO_URI: mongodb://mongodb:27017/?directConnection=true
      SEED_DB: ${SEED_DB:-true}
      AWS_ENDPOINT: http://floci:4566
      SQS_ENDPOINT: http://floci:4566
      QUEUE_URL: http://floci:4566/000000000000/create_agreement_fifo.fifo
      S3_ENDPOINT: http://host.docker.internal:4568
      GA_TRACKING_ID: ${GA_TRACKING_ID:-''}
      QUEUE_NAME: ${QUEUE_NAME:-create_agreement_fifo.fifo}
      ENABLE_TEST_ENDPOINTS: ${ENABLE_TEST_ENDPOINTS:-true}
      JWT_ENABLED: ${JWT_ENABLED:-true}
      AGREEMENTS_JWT_SECRET: ${AGREEMENTS_JWT_SECRET:-a-string-secret-at-least-256-bits-long}
      ENABLE_PAYMENT_HUB: ${ENABLE_PAYMENT_HUB:-false}
      VIEW_AGREEMENT_URI: http://host.docker.internal:3555
      SNS_TOPIC_TYPE_AGREEMENT_STATUS_UPDATED: ${SNS_TOPIC_TYPE_AGREEMENT_STATUS_UPDATED:-io.onsite.agreement.status.updated}
      SNS_TOPIC_ARN_AGREEMENT_STATUS_UPDATED: ${SNS_TOPIC_ARN_AGREEMENT_STATUS_UPDATED:-arn:aws:sns:eu-west-2:000000000000:agreement_status_updated_fifo.fifo}
      SNS_TOPIC_ARN_AUDIT: ${SNS_TOPIC_ARN_AUDIT:-arn:aws:sns:eu-west-2:000000000000:fcp_audit_farming_grants_agreements_api}
      FILES_S3_BUCKET: ${FILES_S3_BUCKET:-farming-grants-agreements-pdf-bucket}
      FILES_S3_BASE_TERM_PREFIX: ${FILES_S3_BASE_TERM_PREFIX:-base}
      FILES_S3_EXTENDED_TERM_PREFIX: ${FILES_S3_EXTENDED_TERM_PREFIX:-extended}
      FILES_S3_MAXIMUM_TERM_PREFIX: ${FILES_S3_MAXIMUM_TERM_PREFIX:-maximum}
      FILES_S3_BASE_TERM_THRESHOLD: ${FILES_S3_BASE_TERM_THRESHOLD:-10}
      FILES_S3_EXTENDED_TERM_THRESHOLD: ${FILES_S3_EXTENDED_TERM_THRESHOLD:-15}
      FILES_S3_MAXIMUM_TERM_THRESHOLD: ${FILES_S3_MAXIMUM_TERM_THRESHOLD:-20}
      FILES_S3_RETENTION_BASE_YEARS: ${FILES_S3_RETENTION_BASE_YEARS:-7}
      LAND_GRANTS_BASE_URL: http://host.docker.internal:3001
      LAND_GRANTS_TOKEN: ${LAND_GRANTS_TOKEN:-sampleToken}
    networks:
      - cdp-tenant

  ################################################################################

  mock-server:
    image: pactfoundation/pact-stub-server:0.7.0
    profiles:
      - mock
      - full
    restart: unless-stopped
    ports:
      - '8081:8081'
    volumes:
      - ./src/contracts/consumer/pacts:/app/pacts
    command: ['-p', '8081', '-d', 'pacts']
    networks:
      - cdp-tenant

volumes:
  mongodb-data:

networks:
  cdp-tenant:
    driver: bridge
